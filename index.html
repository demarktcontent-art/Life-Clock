<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO Life Clock</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #clock { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f0f0; }
        #time { font-size: 48px; margin: 20px; }
        #date { font-size: 24px; margin: 10px; }
    </style>
</head>
<body>
    <div id="clock">
        <div id="time">00:00:00</div>
        <div id="date">YYYY-MM-DD</div>
        <button onclick="startClock()">Start Clock</button>
        <button onclick="stopClock()">Stop Clock</button>
    </div>
    <script>
        let timer;
        function startClock() {
            if (timer) return;
            updateClock();
            timer = setInterval(updateClock, 1000);
        }
        function stopClock() {
            clearInterval(timer);
            timer = null;
        }
        function updateClock() {
            const now = new Date();
            const timeString = now.toUTCString().split(' ')[4];
            const dateString = now.toISOString().split('T')[0];
            document.getElementById('time').textContent = timeString;
            document.getElementById('date').textContent = dateString;
        }
    </script>
</body>
</html>
