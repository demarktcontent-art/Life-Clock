<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Life Clock — Reorganised</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4A853;--gold-l:#F0C97A;--gold-d:#7A5E28;
  --glow:rgba(212,168,83,.12);
  --dk:#07070F;--dk2:#0E0E1C;--dk3:#151525;--dk4:#1C1C30;
  --bdr:rgba(212,168,83,.1);--bdr-h:rgba(212,168,83,.3);
  --tx:#EDE9E0;--tx-d:#6A6580;--tx-m:#A8A39A;
  --green:#4ECAA0;--blue:#5BA8FF;--orange:#FF9048;
  --pink:#FF6B9D;--purple:#A97BFF;--red:#FF5252;--cyan:#38D9F5;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dk);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── SIDEBAR ── */
.sidebar{
width:270px;min-width:270px;background:var(–dk2);
border-right:1px solid var(–bdr);
position:fixed;top:0;left:0;bottom:0;z-index:200;
display:flex;flex-direction:column;overflow-y:auto;
transition:transform .3s ease;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(–dk4);}

.sb-head{padding:22px 20px 16px;border-bottom:1px solid var(–bdr);}
.sb-badge{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(–gold);display:block;margin-bottom:5px;}
.sb-title{font-family:‘Cormorant Garamond’,serif;font-size:19px;font-weight:700;color:var(–gold-l);line-height:1.2;}

/* Ring */
.sb-ring{padding:18px 20px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(–bdr);}
.ring-wrap{position:relative;width:106px;height:106px;margin-bottom:10px;}
.ring-svg{transform:rotate(-90deg);width:106px;height:106px;}
.r-bg{fill:none;stroke:var(–dk4);stroke-width:8;}
.r-fg{fill:none;stroke:url(#rg);stroke-width:8;stroke-linecap:round;stroke-dasharray:298;stroke-dashoffset:298;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);}
.ring-ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.r-pct{font-family:‘Cormorant Garamond’,serif;font-size:28px;font-weight:700;color:var(–gold-l);line-height:1;}
.r-sub{font-size:8px;color:var(–tx-d);font-family:‘IBM Plex Mono’,monospace;letter-spacing:1px;margin-top:1px;}
.sb-info{font-size:11px;color:var(–tx-m);text-align:center;}
.sb-info b{color:var(–gold);}

/* Day grid */
.sb-days{padding:14px 20px;border-bottom:1px solid var(–bdr);}
.sec-lbl{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–tx-d);margin-bottom:8px;display:block;}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
.d-btn{
aspect-ratio:1;border:1px solid var(–bdr);background:transparent;
color:var(–tx-d);font-family:‘IBM Plex Mono’,monospace;font-size:11px;
cursor:pointer;border-radius:3px;transition:all .2s;
display:flex;align-items:center;justify-content:center;position:relative;
}
.d-btn:hover{border-color:var(–gold-d);color:var(–gold);}
.d-btn.active{background:var(–gold-d);border-color:var(–gold);color:#fff;font-weight:600;}
.d-dot{width:4px;height:4px;border-radius:50%;background:var(–green);position:absolute;bottom:2px;right:2px;display:none;}
.d-btn.has-p .d-dot{display:block;}

/* Phase nav */
.sb-nav{flex:1;padding:6px 0;}
.n-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;text-decoration:none;}
.n-item:hover{background:var(–glow);}
.n-item.active{border-left-color:var(–gold);background:var(–glow);}
.n-icon{font-size:14px;width:18px;text-align:center;}
.n-info{flex:1;}
.n-name{font-size:11px;font-weight:500;color:var(–tx);display:block;line-height:1.2;}
.n-time{font-size:9px;color:var(–tx-d);font-family:‘IBM Plex Mono’,monospace;}
.n-bar{width:26px;height:3px;background:var(–dk4);border-radius:2px;overflow:hidden;}
.n-fill{height:100%;background:var(–gold);transition:width .4s;width:0%;}

/* Reminder */
.sb-rem{padding:12px 20px;border-top:1px solid var(–bdr);}
.rem-tog{width:100%;padding:8px 12px;background:var(–dk3);border:1px solid var(–bdr);border-radius:4px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;}
.rem-tog:hover{border-color:var(–gold-d);}
.rem-lbl{font-size:10px;font-family:‘IBM Plex Mono’,monospace;letter-spacing:1px;color:var(–tx-m);}
.rem-ind{width:26px;height:14px;background:var(–dk4);border-radius:7px;position:relative;transition:background .2s;}
.rem-ind.on{background:var(–gold);}
.rem-dot{width:10px;height:10px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;}
.rem-ind.on .rem-dot{left:14px;}

.sb-foot{padding:10px 20px;border-top:1px solid var(–bdr);}
.rst-btn{width:100%;padding:7px;background:transparent;border:1px solid var(–bdr);color:var(–tx-d);font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .2s;}
.rst-btn:hover{border-color:var(–red);color:var(–red);}

/* ── MAIN ── */
.main{margin-left:270px;min-height:100vh;padding-bottom:80px;}

.topbar{
position:sticky;top:0;z-index:100;
background:rgba(7,7,15,.95);backdrop-filter:blur(20px);
border-bottom:1px solid var(–bdr);
padding:12px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.tb-l{display:flex;align-items:center;gap:16px;}
.tb-clk{font-family:‘IBM Plex Mono’,monospace;font-size:22px;font-weight:500;color:var(–gold-l);letter-spacing:2px;line-height:1;}
.tb-dt{font-size:10px;color:var(–tx-d);letter-spacing:.5px;margin-top:2px;}
.tb-r{display:flex;gap:18px;}
.tb-stat{text-align:center;}
.tb-n{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:700;color:var(–gold-l);line-height:1;display:block;}
.tb-l2{font-size:8px;color:var(–tx-d);letter-spacing:1.5px;text-transform:uppercase;font-family:‘IBM Plex Mono’,monospace;}
.g-bar{height:2px;background:var(–dk4);}
.g-fill{height:100%;background:linear-gradient(to right,var(–gold-d),var(–gold-l));transition:width .5s;width:0%;}

.content{padding:0 32px;}

/* Current block */
.cur-banner{display:none;margin:16px 0 0;padding:12px 18px;background:linear-gradient(135deg,rgba(212,168,83,.1),rgba(78,202,160,.06));border:1px solid rgba(212,168,83,.25);border-radius:5px;align-items:center;gap:12px;}
.cur-banner.show{display:flex;}
.cb-pulse{width:8px;height:8px;border-radius:50%;background:var(–gold);animation:pulse 1.5s ease infinite;flex-shrink:0;}
.cb-tx{font-size:12px;color:var(–tx-m);}
.cb-tx b{color:var(–gold-l);}

/* Streak */
.streak-row{display:flex;gap:3px;margin:12px 0 2px;overflow-x:auto;}
.s-pip{min-width:20px;height:20px;border-radius:3px;background:var(–dk4);display:flex;align-items:center;justify-content:center;font-family:‘IBM Plex Mono’,monospace;font-size:8px;color:var(–tx-d);}
.s-pip.partial{background:rgba(212,168,83,.2);color:var(–gold);}
.s-pip.full{background:var(–gold-d);color:var(–gold-l);font-weight:600;}

/* Congrats */
.congrats{display:none;margin:16px 0;padding:18px 24px;background:linear-gradient(135deg,rgba(212,168,83,.12),rgba(78,202,160,.08));border:1px solid rgba(212,168,83,.3);border-radius:5px;text-align:center;}
.congrats.show{display:block;}
.congrats h2{font-family:‘Cormorant Garamond’,serif;font-size:24px;color:var(–gold-l);margin-bottom:3px;}
.congrats p{font-size:12px;color:var(–tx-m);}

/* ── PHASE SECTION ── */
.phase-sec{margin-top:6px;}
.ph-hdr{display:flex;align-items:center;gap:12px;padding:24px 0 14px;position:sticky;top:50px;z-index:50;background:linear-gradient(to bottom,var(–dk) 80%,transparent);}
.ph-icon{font-size:24px;}
.ph-info{flex:1;}
.ph-title{font-family:‘Cormorant Garamond’,serif;font-size:22px;font-weight:700;color:var(–tx);line-height:1;}
.ph-time{font-size:10px;color:var(–tx-d);font-family:‘IBM Plex Mono’,monospace;letter-spacing:1px;margin-top:2px;}
.ph-cnt{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:var(–gold);}
.ph-line{height:1px;background:linear-gradient(to right,rgba(212,168,83,.3),transparent);margin-bottom:8px;}

/* ── BLOCK CARD ── */
.block-card{
background:var(–dk2);border:1px solid var(–bdr);border-radius:6px;
margin-bottom:5px;transition:all .25s;overflow:hidden;
animation:slideIn .35s ease both;
}
.block-card:hover{border-color:var(–bdr-h);box-shadow:0 3px 16px rgba(212,168,83,.05);}
.block-card.done{border-color:rgba(78,202,160,.22);background:rgba(78,202,160,.03);}
.block-card.active-now{border-color:rgba(212,168,83,.38);box-shadow:0 0 0 1px rgba(212,168,83,.12);}

.bc-grid{display:grid;grid-template-columns:68px 1fr 46px;cursor:pointer;}

/* Time col */
.bc-tc{padding:12px 8px;border-right:1px solid var(–bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.bc-t1{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:var(–gold);font-weight:500;text-align:center;}
.bc-t2{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:var(–tx-d);text-align:center;}
.bc-dur{font-size:8px;color:var(–tx-d);margin-top:3px;background:var(–dk3);padding:1px 5px;border-radius:2px;font-family:‘IBM Plex Mono’,monospace;}

/* Body */
.bc-body{padding:12px 14px;}
.bc-r1{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap;}
.bc-type{font-size:7px;font-family:‘IBM Plex Mono’,monospace;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:2px;border:1px solid;flex-shrink:0;}
.t-work{color:var(–blue);border-color:rgba(91,168,255,.3);background:rgba(91,168,255,.07);}
.t-habit{color:var(–gold);border-color:rgba(212,168,83,.3);background:rgba(212,168,83,.07);}
.t-both{color:var(–cyan);border-color:rgba(56,217,245,.3);background:rgba(56,217,245,.07);}
.t-prayer{color:var(–purple);border-color:rgba(169,123,255,.3);background:rgba(169,123,255,.07);}
.t-rest{color:var(–green);border-color:rgba(78,202,160,.3);background:rgba(78,202,160,.07);}

.bc-name{font-size:13px;font-weight:600;color:var(–tx);line-height:1.3;flex:1;transition:color .2s;}
.block-card.done .bc-name{color:var(–green);text-decoration:line-through;text-decoration-color:rgba(78,202,160,.4);}
.bc-desc{font-size:11px;color:var(–tx-d);line-height:1.55;margin-bottom:7px;}

/* Tasks */
.bc-tasks{display:flex;flex-direction:column;gap:3px;margin-top:5px;}
.t-row{display:flex;align-items:flex-start;gap:7px;padding:5px 7px;border-radius:3px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.t-row:hover{background:var(–glow);border-color:var(–bdr);}
.t-row.done{background:rgba(78,202,160,.05);}
.t-cb{width:14px;height:14px;border:1px solid var(–bdr-h);border-radius:2px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:9px;color:transparent;}
.t-row.done .t-cb{background:var(–green);border-color:var(–green);color:#fff;}
.t-lbl{font-size:11px;color:var(–tx-m);line-height:1.45;transition:color .15s;flex:1;}
.t-row.done .t-lbl{color:var(–tx-d);text-decoration:line-through;}
.t-htag{font-size:7px;font-family:‘IBM Plex Mono’,monospace;color:var(–gold);background:rgba(212,168,83,.08);border:1px solid rgba(212,168,83,.2);padding:1px 5px;border-radius:2px;flex-shrink:0;margin-top:2px;white-space:nowrap;}

/* Check col */
.bc-cc{border-left:1px solid var(–bdr);display:flex;align-items:center;justify-content:center;}
.chk-ring{width:28px;height:28px;border-radius:50%;border:2px solid var(–bdr-h);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .3s cubic-bezier(.34,1.56,.64,1);color:transparent;cursor:pointer;}
.chk-ring:hover{border-color:var(–gold);background:var(–glow);transform:scale(1.1);}
.block-card.done .chk-ring{background:var(–green);border-color:var(–green);color:#fff;transform:scale(1.05);}

/* Popup */
.overlay{position:fixed;inset:0;background:rgba(7,7,15,.75);backdrop-filter:blur(8px);z-index:1999;display:none;}
.overlay.show{display:block;}
.popup{
position:fixed;top:50%;left:50%;transform:translate(-50%,-60%) scale(.9);
background:var(–dk2);border:1px solid var(–gold-d);border-radius:8px;
padding:32px 36px;max-width:460px;width:92%;text-align:center;
opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:2000;
}
.popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all;}
.pp-icon{font-size:38px;margin-bottom:10px;}
.pp-title{font-family:‘Cormorant Garamond’,serif;font-size:21px;color:var(–gold-l);margin-bottom:5px;}
.pp-time{font-family:‘IBM Plex Mono’,monospace;font-size:11px;color:var(–gold);letter-spacing:2px;margin-bottom:8px;}
.pp-desc{font-size:12px;color:var(–tx-m);line-height:1.6;margin-bottom:22px;}
.pp-btns{display:flex;gap:10px;justify-content:center;}
.pp-btn{padding:9px 18px;border-radius:4px;font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid;}
.pp-ok{background:var(–gold);border-color:var(–gold);color:var(–dk);}
.pp-ok:hover{background:var(–gold-l);}
.pp-skip{background:transparent;border-color:var(–bdr);color:var(–tx-d);}
.pp-skip:hover{border-color:var(–red);color:var(–red);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(–dk3);border:1px solid var(–green);border-radius:4px;padding:10px 16px;font-family:‘IBM Plex Mono’,monospace;font-size:10px;letter-spacing:.5px;color:var(–green);transform:translateY(50px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;max-width:260px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.warn{border-color:var(–orange);color:var(–orange);}
.toast.remind{border-color:var(–gold);color:var(–gold);}

@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,168,83,.5);}50%{box-shadow:0 0 0 7px rgba(212,168,83,0);}}

.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:300;background:var(–dk3);border:1px solid var(–bdr);border-radius:4px;padding:7px 10px;color:var(–gold);cursor:pointer;font-size:15px;}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.main{margin-left:0;}
.menu-btn{display:block;}
.topbar{padding:12px 14px 12px 48px;}
.content{padding:0 14px;}
.tb-clk{font-size:17px;}
}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(–dk4);}
</style>

</head>
<body>
<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <span class="sb-badge">Coach Kanchon — Life Clock Framework</span>
    <div class="sb-title">CEO Daily<br>Command Center</div>
  </div>
  <div class="sb-ring">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 106 106">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7A5E28"/>
            <stop offset="100%" stop-color="#F0C97A"/>
          </linearGradient>
        </defs>
        <circle class="r-bg" cx="53" cy="53" r="47.5"/>
        <circle class="r-fg" id="ringFg" cx="53" cy="53" r="47.5"/>
      </svg>
      <div class="ring-ctr">
        <span class="r-pct" id="ringPct">0%</span>
        <span class="r-sub">TODAY</span>
      </div>
    </div>
    <div class="sb-info"><b id="doneC">0</b> of <b id="totalC">0</b> complete</div>
  </div>
  <div class="sb-days">
    <span class="sec-lbl">Focus Phase — Days 1–10</span>
    <div class="day-grid" id="dayGrid"></div>
  </div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-rem">
    <div class="rem-tog" onclick="toggleRem()">
      <span class="rem-lbl">🔔 Block Reminders</span>
      <div class="rem-ind" id="remInd"><div class="rem-dot"></div></div>
    </div>
  </div>
  <div class="sb-foot">
    <button class="rst-btn" onclick="resetDay()">↺ Reset Today</button>
  </div>
</div>

<div class="main">
  <div class="g-bar"><div class="g-fill" id="gFill"></div></div>
  <div class="topbar">
    <div class="tb-l">
      <div>
        <div class="tb-clk" id="tbClk">--:--:--</div>
        <div class="tb-dt" id="tbDt">March 2026</div>
      </div>
    </div>
    <div class="tb-r">
      <div class="tb-stat"><span class="tb-n" id="tbDone">0</span><span class="tb-l2">Done</span></div>
      <div class="tb-stat"><span class="tb-n" id="tbLeft">0</span><span class="tb-l2">Left</span></div>
      <div class="tb-stat"><span class="tb-n" id="tbDay">D1</span><span class="tb-l2">Day</span></div>
    </div>
  </div>
  <div class="content">
    <div class="cur-banner" id="curBanner">
      <div class="cb-pulse"></div>
      <div class="cb-tx">Now: <b id="cbTx">—</b></div>
    </div>
    <div class="streak-row" id="streakRow"></div>
    <div class="congrats" id="congrats">
      <h2>🏆 Perfect Day!</h2>
      <p>All blocks complete. Log it in your Life Clock Tracker. The disciplined CEO wins again.</p>
    </div>
    <div id="schedCon"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
  <div class="pp-icon" id="ppIcon">⏰</div>
  <div class="pp-title" id="ppTitle">—</div>
  <div class="pp-time" id="ppTime">—</div>
  <div class="pp-desc" id="ppDesc">—</div>
  <div class="pp-btns">
    <button class="pp-btn pp-ok" onclick="markFromPopup()">✓ Mark Done</button>
    <button class="pp-btn pp-skip" onclick="closePopup()">Snooze 5 min</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  SCHEDULE — Life Clock framework is the spine.
//  Your exact work tasks slot inside each block.
//  Time corrected to follow the Life Clock order.
// ═══════════════════════════════════════════════
const SCHED = [

  // ─────────────────────────────────────────────
  //  PHASE 1 · SUCCESS IDENTITY + DIVINE + BODY
  //  Life Clock: 5 AM start, identity first
  // ─────────────────────────────────────────────
  {
    id:'p1', icon:'🌅', title:'Morning Power Core',
    subtitle:'Identity · Divine · Body',
    time:'5:00 – 7:00 AM',
    blocks:[
      {
        id:'b1', s:'5:00', e:'5:30', dur:'30m', type:'prayer',
        name:'Fajr Prayer + Remembrance + Sacred Reading',
        desc:'Day starts with the Almighty. Before your CEO hat — your human soul. This 30 minutes is the most important of the entire day.',
        tasks:[
          {id:'t1a', tx:'Fajr Prayer — full salah, no rushing', h:'#36 Prayer Time'},
          {id:'t1b', tx:'Remembrance (Dhikr) — morning adhkar, 5 min', h:'#37 Remembrance'},
          {id:'t1c', tx:'Sacred Reading — Quran, 1 page minimum', h:'#38 Sacred Reading'},
          {id:'t1d', tx:'Good Deed intention — plan today\'s unseen, unsaid good act', h:'#39 Good Deed'},
        ]
      },
      {
        id:'b2', s:'5:30', e:'5:45', dur:'15m', type:'habit',
        name:'Power Declaration + Mind Movie + Power Pose',
        desc:'Program your identity before the world programs you. These 15 minutes set your neurological baseline for the entire day.',
        tasks:[
          {id:'t2a', tx:'Power Declaration — say out loud 3x: "I AM Disciplined"', h:'#1 Power Declaration'},
          {id:'t2b', tx:'Mind Movie — visualise your best CEO day for 60 seconds', h:'#2 Mind Movie'},
          {id:'t2c', tx:'Power Pose — stand tall, arms wide, 2 full minutes', h:'#3 Power Pose'},
          {id:'t2d', tx:'Gratitude Drop — write 3 things you\'re grateful for right now', h:'#6 Gratitude Drop'},

let day=1, remOn=false, taskSt={}, blockSt={}, lastRem=null, popBid=null, snoozeT=null;
const SK=d=>`lc2_t_d${d}`, BK=d=>`lc2_b_d${d}`;
function load(){ try{taskSt=JSON.parse(localStorage.getItem(SK(day))||'{}'); blockSt=JSON.parse(localStorage.getItem(BK(day))||'{}');}catch(e){taskSt={};blockSt={};} }
function save(){ try{localStorage.setItem(SK(day),JSON.stringify(taskSt)); localStorage.setItem(BK(day),JSON.stringify(blockSt));}catch(e){} }

// ═══════════════ COUNTS ═══════════════
function counts(){
  let t=0,d=0;
  SCHED.forEach(p=>p.blocks.forEach(b=>{
    b.tasks.forEach(tk=>{t++;if(taskSt[tk.id])d++;});
    t++;if(blockSt[b.id])d++;
  }));
  return{t,d};
}

// ═══════════════ RENDER ═══════════════
function renderAll(){ renderDays(); renderNav(); renderSched(); renderStreak(); updateProg(); highlightNow(); }

function renderDays(){
  const g=document.getElementById('dayGrid'); g.innerHTML='';
  for(let d=1;d<=10;d++){
    const b=document.createElement('button');
    b.className='d-btn'+(d===day?' active':'');
    b.innerHTML=`${d}<span class="d-dot"></span>`;
    try{ const t=JSON.parse(localStorage.getItem(SK(d))||'{}'); if(Object.keys(t).length>0)b.classList.add('has-p'); }catch(e){}
    b.onclick=()=>{ day=d; load(); renderAll(); };
    g.appendChild(b);
  }
}

function renderNav(){
  const nav=document.getElementById('sbNav'); nav.innerHTML='';
  SCHED.forEach(phase=>{
    const done=phase.blocks.filter(b=>blockSt[b.id]).length;
    const pct=phase.blocks.length?Math.round(done/phase.blocks.length*100):0;
    const a=document.createElement('a');
    a.className='n-item'; a.href='#'+phase.id;
    a.innerHTML=`<span class="n-icon">${phase.icon}</span><div class="n-info"><span class="n-name">${phase.title}</span><span class="n-time">${phase.time}</span></div><div class="n-bar"><div class="n-fill" style="width:${pct}%"></div></div>`;
    nav.appendChild(a);
  });
}

function renderSched(){
  const c=document.getElementById('schedCon'); c.innerHTML='';
  SCHED.forEach((phase,pi)=>{
    const sec=document.createElement('div');
    sec.className='phase-sec'; sec.id=phase.id;
    const done=phase.blocks.filter(b=>blockSt[b.id]).length;
    sec.innerHTML=`<div class="ph-hdr"><span class="ph-icon">${phase.icon}</span><div class="ph-info"><div class="ph-title">${phase.title}</div><div class="ph-time">${phase.subtitle} · ${phase.time}</div></div><span class="ph-cnt" id="pc-${phase.id}">${done}/${phase.blocks.length}</span></div><div class="ph-line"></div>`;
    phase.blocks.forEach((blk,bi)=>{
      const done=!!blockSt[blk.id];
      const card=document.createElement('div');
      card.className='block-card'+(done?' done':'');
      card.id='bc-'+blk.id;
      card.style.animationDelay=(pi*.03+bi*.025)+'s';
      const tasksH=blk.tasks.map(t=>{
        const td=!!taskSt[t.id];
        return `<div class="t-row${td?' done':''}" id="tr-${t.id}" onclick="toggleTask('${t.id}','${blk.id}',this)"><div class="t-cb">${td?'✓':''}</div><span class="t-lbl">${t.tx}</span><span class="t-htag">${t.h}</span></div>`;
      }).join('');
      card.innerHTML=`<div class="bc-grid" onclick="toggleBlock('${blk.id}',this)"><div class="bc-tc"><span class="bc-t1">${blk.s}</span><span class="bc-t2">${blk.e}</span><span class="bc-dur">${blk.dur}</span></div><div class="bc-body"><div class="bc-r1"><span class="bc-type t-${blk.type}">${blk.type==='work'?'Work':blk.type==='prayer'?'Prayer':blk.type==='rest'?'Rest':blk.type==='habit'?'Habit':'Work+Habit'}</span><span class="bc-name">${blk.name}</span></div><div class="bc-desc">${blk.desc}</div><div class="bc-tasks" onclick="event.stopPropagation()">${tasksH}</div></div><div class="bc-cc"><div class="chk-ring">${done?'✓':''}</div></div></div>`;
      sec.appendChild(card);
    });
    c.appendChild(sec);
  });
}

function renderStreak(){
  const row=document.getElementById('streakRow'); row.innerHTML='';
  for(let d=1;d<=10;d++){
    const pip=document.createElement('div'); pip.className='s-pip'; pip.textContent=d;
    try{
      const ts=JSON.parse(localStorage.getItem(SK(d))||'{}');
      const bs=JSON.parse(localStorage.getItem(BK(d))||'{}');
      const dk=Object.keys(ts).length+Object.keys(bs).length;
      if(dk>0&&dk<80)pip.classList.add('partial');
      else if(dk>=80)pip.classList.add('full');
    }catch(e){}
    row.appendChild(pip);
  }
}

function updateProg(){
  const{t,d}=counts();
  const pct=t?Math.round(d/t*100):0;
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('doneC').textContent=d;
  document.getElementById('totalC').textContent=t;
  document.getElementById('tbDone').textContent=d;
  document.getElementById('tbLeft').textContent=t-d;
  document.getElementById('tbDay').textContent='D'+day;
  document.getElementById('gFill').style.width=pct+'%';
  const circ=298; document.getElementById('ringFg').style.strokeDashoffset=circ-(pct/100)*circ;
  document.getElementById('congrats').classList.toggle('show',d===t&&t>0);
  SCHED.forEach(ph=>{
    const el=document.getElementById('pc-'+ph.id);
    if(el){ const dn=ph.blocks.filter(b=>blockSt[b.id]).length; el.textContent=`${dn}/${ph.blocks.length}`; }
  });
}

// ═══════════════ TOGGLES ═══════════════
function toggleBlock(bid){
  const was=!!blockSt[bid]; blockSt[bid]=!was;
  if(!was) SCHED.forEach(p=>p.blocks.forEach(b=>{ if(b.id===bid) b.tasks.forEach(t=>{taskSt[t.id]=true;}); }));
  save();
  const card=document.getElementById('bc-'+bid);
  if(card){
    card.classList.toggle('done',!was);
    const r=card.querySelector('.chk-ring'); if(r)r.textContent=!was?'✓':'';
    SCHED.forEach(p=>p.blocks.forEach(b=>{ if(b.id===bid) b.tasks.forEach(t=>{ const tr=document.getElementById('tr-'+t.id); if(tr){tr.classList.toggle('done',!!taskSt[t.id]); const cb=tr.querySelector('.t-cb'); if(cb)cb.textContent=taskSt[t.id]?'✓':'';}  }); }));
  }
  updateProg(); renderNav(); renderStreak();
  if(!was){ let n=''; SCHED.forEach(p=>p.blocks.forEach(b=>{if(b.id===bid)n=b.name;})); showToast('✓ '+n.substring(0,38)); }
}

function toggleTask(tid,bid,el){
  const was=!!taskSt[tid]; taskSt[tid]=!was;
  el.classList.toggle('done',!was);
  const cb=el.querySelector('.t-cb'); if(cb)cb.textContent=!was?'✓':'';
  save();
  // auto-complete block if all tasks done
  let all=true;
  SCHED.forEach(p=>p.blocks.forEach(b=>{ if(b.id===bid) b.tasks.forEach(t=>{if(!taskSt[t.id])all=false;}); }));
  if(all&&!blockSt[bid]){ blockSt[bid]=true; save(); const card=document.getElementById('bc-'+bid); if(card){card.classList.add('done'); const r=card.querySelector('.chk-ring');if(r)r.textContent='✓';} showToast('🎯 Block complete!'); }
  updateProg(); renderNav();
}

// ═══════════════ CLOCK + HIGHLIGHT ═══════════════
function toMin(s){ const[h,m]=(s||'00:00').split(':').map(Number); return h*60+m; }
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }

function highlightNow(){
  const now=nowMin(); let cur=null;
  SCHED.forEach(p=>p.blocks.forEach(b=>{
    const card=document.getElementById('bc-'+b.id);
    const active=now>=toMin(b.s)&&now<toMin(b.e)&&!blockSt[b.id];
    if(card)card.classList.toggle('active-now',active);
    if(active)cur=b;
  }));
  const banner=document.getElementById('curBanner');
  if(cur&&!blockSt[cur.id]){ banner.classList.add('show'); document.getElementById('cbTx').textContent=cur.s+' – '+cur.name; }
  else banner.classList.remove('show');
  if(remOn&&cur&&cur.id!==lastRem&&!blockSt[cur.id]){ lastRem=cur.id; popBid=cur.id; showPopup(cur); }
}

function tick(){
  const n=new Date(); const p=x=>x.toString().padStart(2,'0');
  document.getElementById('tbClk').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  document.getElementById('tbDt').textContent=`March 2026 — Day ${day}`;
}

// ═══════════════ REMINDERS ═══════════════
function toggleRem(){
  remOn=!remOn;
  document.getElementById('remInd').classList.toggle('on',remOn);
  showToast(remOn?'🔔 Reminders ON':'🔕 Reminders OFF','remind');
  if(remOn&&'Notification'in window&&Notification.permission==='default') Notification.requestPermission();
}

function showPopup(blk){
  const icons={prayer:'🕌',rest:'😴',habit:'⚡',work:'💼',both:'🎯'};
  document.getElementById('ppIcon').textContent=icons[blk.type]||'⏰';
  document.getElementById('ppTitle').textContent=blk.name;
  document.getElementById('ppTime').textContent=blk.s+' – '+blk.e+' ('+blk.dur+')';
  document.getElementById('ppDesc').textContent=blk.desc;
  document.getElementById('popup').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  if('Notification'in window&&Notification.permission==='granted') new Notification('⏰ Life Clock',{body:blk.s+' — '+blk.name});
}

function markFromPopup(){
  if(popBid){ blockSt[popBid]=true; SCHED.forEach(p=>p.blocks.forEach(b=>{ if(b.id===popBid) b.tasks.forEach(t=>{taskSt[t.id]=true;}); })); save(); const c=document.getElementById('bc-'+popBid); if(c){c.classList.add('done');c.classList.remove('active-now');const r=c.querySelector('.chk-ring');if(r)r.textContent='✓';} updateProg();renderNav(); showToast('✓ Done!'); }
  closePopup();
}
function closePopup(){
  document.getElementById('popup').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  if(snoozeT)clearTimeout(snoozeT);
  snoozeT=setTimeout(()=>{ if(remOn&&popBid&&!blockSt[popBid]){ let b=null; SCHED.forEach(p=>p.blocks.forEach(bl=>{if(bl.id===popBid)b=bl;})); if(b)showPopup(b); } },5*60*1000);
}

function showToast(msg,type=''){
  const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function resetDay(){
  if(!confirm(`Reset Day ${day}?`))return;
  taskSt={};blockSt={};save();lastRem=null;renderAll();showToast('↺ Day '+day+' reset','warn');
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

// ═══════════════ INIT ═══════════════
load(); renderAll(); setInterval(tick,1000); setInterval(highlightNow,30000); tick();
</script>
